<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organization Log in · CatFace</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #fff7f8 0%, #f6f7fb 100%);
      color: #1f2937;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(860px, 100%);
      background: #fff;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(17, 24, 39, .14);
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(320px, 380px);
    }
    .main {
      padding: 32px;
    }
    .side {
      background: linear-gradient(135deg, #111827, #374151);
      color: #fff;
      padding: 32px 28px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 24px;
    }
    .back-link, .text-link {
      color: #2563eb;
      text-decoration: none;
    }
    .back-link:hover, .text-link:hover {
      text-decoration: underline;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 20px;
      margin-top: 12px;
    }
    .brand-mark {
      width: 40px;
      height: 40px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: #ff2442;
      color: #fff;
      font-size: 18px;
    }
    h1 {
      margin: 20px 0 8px;
      font-size: 28px;
    }
    p {
      margin: 0;
      line-height: 1.6;
    }
    .sub {
      color: #6b7280;
      margin-bottom: 24px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin: 14px 0;
    }
    .field label {
      font-size: 14px;
      font-weight: 600;
      color: #374151;
    }
    .field input {
      width: 100%;
      border: 1px solid #d8dce3;
      border-radius: 16px;
      padding: 14px 16px;
      font: inherit;
      color: #111827;
      background: #fff;
    }
    .field input:focus {
      outline: none;
      border-color: #93c5fd;
      box-shadow: 0 0 0 4px rgba(147, 197, 253, .18);
    }
    .note {
      margin-top: 10px;
      min-height: 52px;
      padding: 14px 16px;
      border-radius: 18px;
      background: #ffffff;
      color: #475467;
      font-size: 13px;
    }
    .status {
      display: none;
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 16px;
      line-height: 1.6;
      font-size: 14px;
    }
    .status.show { display: block; }
    .status.error {
      background: #fef2f2;
      color: #b42318;
    }
    .status.success {
      background: #ecfdf3;
      color: #027a48;
    }
    .btn-primary {
      width: 100%;
      margin-top: 10px;
      border: none;
      border-radius: 999px;
      padding: 14px 18px;
      background: #111827;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-primary:hover {
      background: #1f2937;
    }
    .cred-card {
      margin-top: auto;
      border-radius: 22px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      padding: 18px;
      line-height: 1.7;
      font-size: 14px;
    }
    .cred-card code {
      background: rgba(255,255,255,.12);
      padding: 2px 6px;
      border-radius: 8px;
      color: #fff;
    }
    .side ul {
      margin: 0;
      padding-left: 18px;
      line-height: 1.8;
      font-size: 14px;
      color: rgba(255,255,255,.88);
    }
    @media (max-width: 860px) {
      .card {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <section class="main">
      <a class="back-link" href="index.html">← Back to Main Page</a>
      <div class="brand">
        <span class="brand-mark">🏥</span>
        <span>CatFace Organization Portal</span>
      </div>
      <h1>Organization Log in</h1>
      <p class="sub">Use your rescue organization email and password to enter the rescue dashboard.</p>

      <form id="org-login-form">
        <div class="field">
          <label for="org-email">Organization Email</label>
          <input id="org-email" type="email" placeholder="Enter organization email" required>
        </div>
        <div class="field">
          <label for="org-password">Password</label>
          <input id="org-password" type="password" placeholder="Enter password" required>
        </div>

        <div class="note" aria-hidden="true"></div>

        <div class="status" id="org-login-status"></div>
        <button class="btn-primary" type="submit">Log in to Rescue Dashboard</button>
      </form>
    </section>

    <aside class="side">
      <div class="cred-card">
        <div style="font-weight:700; margin-bottom:8px;">Default development account</div>
        <div>Email: <code>rescue@catface.local</code></div>
        <div>Password: <code>Rescue123!</code></div>
      </div>
    </aside>
  </div>

  <script src="../js/org-login.js"></script>
</body>
</html>
