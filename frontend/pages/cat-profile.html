<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cat Creator Profile</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: #fafafa;
      color: #222;
    }
    a { color: inherit; text-decoration: none; }
    .header {
      position: sticky;
      top: 0;
      background: #ffffffcc;
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #f1f1f1;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      color: #666;
      padding: 4px 8px;
      border-radius: 999px;
      background: #f5f5f5;
    }
    .main {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px;
    }
    .profile {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 6px 18px rgba(0,0,0,.06);
    }
    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fad0c4 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
      font-size: 28px;
    }
    .info-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .name {
      font-size: 18px;
      font-weight: 700;
    }
    .bio {
      font-size: 13px;
      color: #666;
    }
    .stats {
      display: flex;
      gap: 16px;
      font-size: 13px;
      color: #555;
      margin-top: 4px;
    }
    .stat-label {
      color: #999;
      margin-left: 2px;
    }
    .follow-btn {
      border-radius: 999px;
      padding: 8px 18px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      background: #ff2442;
      color: #fff;
      box-shadow: 0 6px 18px rgba(255,36,66,.4);
    }
    .follow-btn.is-following {
      background: #f5f5f5;
      color: #444;
      box-shadow: none;
      border: 1px solid #e3e3e3;
    }
    .section {
      margin-top: 18px;
      padding: 16px;
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 4px 12px rgba(0,0,0,.03);
      font-size: 14px;
    }
    .section h2 {
      margin: 0 0 10px;
      font-size: 15px;
    }
    .placeholder {
      font-size: 13px;
      color: #888;
    }
  </style>
</head>
<body>
  <header class="header">
    <a href="/pages/index.html" class="back-link">← Back to Community</a>
    <div style="font-size:14px;color:#666;">Cat Creator Profile</div>
  </header>

  <main class="main">
    <section class="profile">
      <div class="avatar" id="avatar">C</div>
      <div class="info-main">
        <div class="name" id="name">Cat Lover</div>
        <div class="bio" id="bio">Sharing daily moments of my cat on CatFace.</div>
        <div class="stats">
          <div><span id="followers">0</span><span class="stat-label"> followers</span></div>
          <div><span id="following">0</span><span class="stat-label"> following</span></div>
        </div>
      </div>
      <button class="follow-btn" type="button" id="followBtn">Follow</button>
    </section>

    <section class="section">
      <h2>Posts from this creator</h2>
      <p class="placeholder">In the prototype, posts are not filtered by author yet. Later, backend or shared storage can be used to show only this creator's posts.</p>
    </section>
  </main>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const author = params.get("author") || "Cat Lover";
      const avatarEl = document.getElementById("avatar");
      const nameEl = document.getElementById("name");
      const followersEl = document.getElementById("followers");
      const followingEl = document.getElementById("following");
      const followBtn = document.getElementById("followBtn");

      nameEl.textContent = author;
      avatarEl.textContent = (author.trim()[0] || "C").toUpperCase();

      const keyFollowers = "catface_followers_" + author;
      const keyFollowing = "catface_following_you";

      function getNumber(key, fallback) {
        try {
          const v = window.localStorage.getItem(key);
          if (v == null) return fallback;
          const n = parseInt(v, 10);
          return isNaN(n) ? fallback : n;
        } catch (e) {
          return fallback;
        }
      }
      function setNumber(key, value) {
        try {
          window.localStorage.setItem(key, String(value));
        } catch (e) {}
      }

      let followers = getNumber(keyFollowers, Math.floor(Math.random() * 900) + 100);
      let following = getNumber(keyFollowing, 0);
      let isFollowing = false;

      const keyIsFollowing = "catface_is_following_" + author;
      try {
        isFollowing = window.localStorage.getItem(keyIsFollowing) === "1";
      } catch (e) {
        isFollowing = false;
      }

      function render() {
        followersEl.textContent = followers;
        followingEl.textContent = following;
        if (isFollowing) {
          followBtn.textContent = "Following";
          followBtn.classList.add("is-following");
        } else {
          followBtn.textContent = "Follow";
          followBtn.classList.remove("is-following");
        }
      }

      followBtn.addEventListener("click", function () {
        isFollowing = !isFollowing;
        if (isFollowing) {
          followers += 1;
          following += 1;
        } else {
          followers = Math.max(0, followers - 1);
          following = Math.max(0, following - 1);
        }
        setNumber(keyFollowers, followers);
        setNumber(keyFollowing, following);
        try {
          window.localStorage.setItem(keyIsFollowing, isFollowing ? "1" : "0");
        } catch (e) {}
        render();
      });

      render();
    })();
  </script>
</body>
</html>
