<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>猫咪档案 - CatFace</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .page { max-width: 480px; margin: 0 auto; padding: 16px; font-family: sans-serif; }
    .profile-photo { width: 100%; max-height: 300px; object-fit: cover; border-radius: 12px; background: #f0f0f0; }
    .profile-name { font-size: 22px; font-weight: bold; margin: 12px 0 8px; }
    .profile-meta { color: #666; font-size: 14px; margin-bottom: 12px; }
    .profile-desc { font-size: 15px; line-height: 1.5; color: #333; margin-bottom: 16px; }
    .section { margin-bottom: 20px; }
    .section-title { font-size: 16px; font-weight: bold; margin-bottom: 8px; color: #333; }
    .tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag { background: #ffeaa7; color: #333; padding: 4px 10px; border-radius: 20px; font-size: 13px; }
    .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; margin-right: 8px; margin-top: 8px; }
    .btn-primary { background: #ff9f43; color: #fff; }
    .nav { margin-bottom: 16px; }
    .nav a { color: #ff9f43; text-decoration: none; }
    .edit-form { display: none; }
    .edit-form.show { display: block; }
    .edit-form label { display: block; margin: 10px 0 4px; font-size: 14px; }
    .edit-form input, .edit-form select, .edit-form textarea { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
    .edit-form textarea { min-height: 80px; }
  </style>
</head>
<body>
  <div class="page">
    <div class="nav"><a href="adoption.html">← 返回领养</a></div>

    <div id="profileView">
      <img class="profile-photo" id="profilePhoto" src="" alt="">
      <h1 class="profile-name" id="profileName">加载中…</h1>
      <div class="profile-meta" id="profileMeta"></div>
      <div class="profile-desc" id="profileDesc"></div>
      <div class="section" id="sectionTags">
        <div class="section-title">标签</div>
        <div class="tags" id="profileTags"></div>
      </div>
      <div class="section" id="sectionOrg" style="display:none">
        <div class="section-title">救助机构</div>
        <div id="profileOrg"></div>
      </div>
      <button type="button" class="btn btn-primary" id="btnEdit">编辑档案</button>
      <button type="button" class="btn btn-primary" id="btnApply" style="display:none">申请领养</button>
    </div>

    <div id="profileEdit" class="edit-form">
      <h2>编辑猫咪信息</h2>
      <input type="hidden" id="editId">
      <label>名字 *</label>
      <input type="text" id="editName" required>
      <label>品种</label>
      <input type="text" id="editBreed">
      <label>年龄（月）</label>
      <input type="number" id="editAgeMonths" min="0" placeholder="如 6">
      <label>性别</label>
      <select id="editGender">
        <option value="">请选择</option>
        <option value="公">公</option>
        <option value="母">母</option>
      </select>
      <label>毛色</label>
      <input type="text" id="editColor">
      <label>简介</label>
      <textarea id="editDescription"></textarea>
      <label>照片 URL</label>
      <input type="text" id="editPhotoUrl" placeholder="https://...">
      <label>是否可领养</label>
      <select id="editIsAvailable">
        <option value="true">是</option>
        <option value="false">否</option>
      </select>
      <div style="margin-top:16px">
        <button type="button" class="btn btn-primary" id="btnSave">保存</button>
        <button type="button" class="btn" id="btnCancelEdit">取消</button>
      </div>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/cat-profile.js"></script>
</body>
</html>
