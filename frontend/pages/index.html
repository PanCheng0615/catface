<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CatFace — 首页</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <!-- 导航栏 -->
  <nav style="background:#fff; padding:16px 32px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 1px 4px rgba(0,0,0,0.08);">
    <h1 style="color:#FF6B6B; font-size:22px;">🐱 CatFace</h1>
    <div style="display:flex; gap:16px;">
      <a href="adoption.html">领养</a>
      <a href="cat-facebook.html">社区</a>
      <a href="health.html">健康</a>
      <a href="account.html">我的</a>
      <a href="log-in.html" id="nav-login">登录</a>
      <a href="#" id="nav-logout" class="hidden" onclick="logout()">退出</a>
    </div>
  </nav>

  <!-- 主体 -->
  <main style="max-width:800px; margin:60px auto; text-align:center; padding:0 16px;">
    <h2 style="font-size:36px; margin-bottom:16px;">找到你的缘分猫咪 🐾</h2>
    <p style="color:#888; font-size:16px; margin-bottom:32px;">浏览、领养、关注，一站式猫咪社交平台</p>
    <div style="display:flex; gap:16px; justify-content:center; flex-wrap:wrap;">
      <a href="adoption.html" class="btn btn-primary">开始领养</a>
      <a href="cat-facebook.html" class="btn btn-secondary">逛社区</a>
    </div>
  </main>

  <script src="../js/config.js"></script>
  <script>
    // 根据登录状态显示/隐藏导航按钮
    if (getToken()) {
      document.getElementById('nav-login').classList.add('hidden');
      document.getElementById('nav-logout').classList.remove('hidden');
    }
  </script>
</body>
</html>
