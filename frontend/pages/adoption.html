<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>领养 - CatFace</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .page { max-width: 420px; margin: 0 auto; padding: 16px; font-family: sans-serif; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); overflow: hidden; margin-bottom: 16px; }
    .card-img { width: 100%; height: 280px; object-fit: cover; background: #f0f0f0; }
    .card-body { padding: 14px; }
    .card-name { font-size: 18px; font-weight: bold; margin-bottom: 6px; }
    .card-meta { color: #666; font-size: 14px; margin-bottom: 8px; }
    .card-desc { font-size: 14px; color: #444; line-height: 1.4; }
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .tabs button { flex: 1; padding: 10px; border: 1px solid #ddd; background: #fff; border-radius: 8px; cursor: pointer; }
    .tabs button.active { background: #ff9f43; color: #fff; border-color: #ff9f43; }
    .swipe-zone { position: relative; min-height: 320px; }
    .swipe-card { position: absolute; left: 0; right: 0; transition: transform 0.2s; }
    .swipe-btns { display: flex; justify-content: center; gap: 24px; margin-top: 16px; }
    .swipe-btns button { width: 56px; height: 56px; border-radius: 50%; border: none; cursor: pointer; font-size: 24px; }
    .btn-pass { background: #eee; color: #666; }
    .btn-like { background: #ff9f43; color: #fff; }
    .empty { text-align: center; padding: 40px 20px; color: #888; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 100; }
    .modal.show { display: flex; }
    .modal-box { background: #fff; border-radius: 12px; padding: 24px; max-width: 360px; width: 90%; }
    .modal-box h3 { margin-top: 0; }
    .modal-box label { display: block; margin: 10px 0 4px; font-size: 14px; }
    .modal-box input, .modal-box select { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
    .modal-actions { margin-top: 20px; display: flex; gap: 10px; justify-content: flex-end; }
    .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; }
    .btn-primary { background: #ff9f43; color: #fff; }
    .nav { margin-bottom: 16px; }
    .nav a { color: #ff9f43; text-decoration: none; }
  </style>
</head>
<body>
  <div class="page">
    <div class="nav"><a href="index.html">← 首页</a></div>
    <h1>领养猫咪</h1>

    <div class="tabs">
      <button type="button" class="tab-btn active" data-tab="discover">发现</button>
      <button type="button" class="tab-btn" data-tab="liked">已喜欢</button>
      <button type="button" class="tab-btn" data-tab="applications">我的申请</button>
    </div>

    <button type="button" class="btn btn-primary" id="btnPreferences" style="margin-bottom:12px">偏好设置</button>

    <!-- 发现：滑动卡片 -->
    <div id="panel-discover" class="panel">
      <div class="swipe-zone" id="swipeZone">
        <div id="swipeCardPlaceholder"></div>
      </div>
      <div class="swipe-btns">
        <button type="button" class="btn-pass" id="btnPass" title="不感兴趣">👋</button>
        <button type="button" class="btn-like" id="btnLike" title="喜欢">❤️</button>
      </div>
      <div id="discoverEmpty" class="empty" style="display:none">暂无更多猫咪，稍后再来看看吧～</div>
    </div>

    <!-- 已喜欢列表 -->
    <div id="panel-liked" class="panel" style="display:none">
      <div id="likedList"></div>
      <div id="likedEmpty" class="empty" style="display:none">还没有喜欢的猫咪，去发现里滑一滑吧～</div>
    </div>

    <!-- 我的申请 -->
    <div id="panel-applications" class="panel" style="display:none">
      <div id="applicationsList"></div>
      <div id="applicationsEmpty" class="empty" style="display:none">暂无领养申请</div>
    </div>
  </div>

  <!-- 偏好设置弹窗 -->
  <div class="modal" id="modalPreferences">
    <div class="modal-box">
      <h3>领养偏好</h3>
      <label>偏好年龄</label>
      <input type="text" id="prefAge" placeholder="如：0-12 月">
      <label>偏好性别</label>
      <select id="prefGender">
        <option value="">不限</option>
        <option value="公">公</option>
        <option value="母">母</option>
      </select>
      <label>偏好品种</label>
      <input type="text" id="prefBreed" placeholder="如：橘猫、英短">
      <div class="modal-actions">
        <button type="button" class="btn" id="btnPrefCancel">取消</button>
        <button type="button" class="btn btn-primary" id="btnPrefSave">保存</button>
      </div>
    </div>
  </div>

  <!-- 申请领养弹窗 -->
  <div class="modal" id="modalApply">
    <div class="modal-box">
      <h3>申请领养 <span id="applyCatName"></span></h3>
      <input type="hidden" id="applyCatId">
      <label>留言（选填）</label>
      <textarea id="applyMessage" rows="3" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;box-sizing:border-box" placeholder="介绍一下您的情况或想说的话"></textarea>
      <div class="modal-actions">
        <button type="button" class="btn" id="btnApplyCancel">取消</button>
        <button type="button" class="btn btn-primary" id="btnApplySubmit">提交申请</button>
      </div>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/adoption.js"></script>
</body>
</html>
